# DOSUONE — Admin panel (Vite build)
# Domain: one.dosutech.site
# Static: /home/dosuTech/appbandt/admin/dist
#
# Build: cd /home/dosuTech/appbandt/admin && VITE_API_URL=http://api-one.dosutech.site/api/v1 npm run build
#
# sudo cp .../deploy/nginx/one.dosutech.site.conf /etc/nginx/sites-available/
# sudo ln -sf /etc/nginx/sites-available/one.dosutech.site.conf /etc/nginx/sites-enabled/
# sudo nginx -t && sudo systemctl reload nginx
#
# Certbot sau: sudo certbot --nginx -d one.dosutech.site

server {
    listen 80;
    listen [::]:80;
    server_name one.dosutech.site;

    root /home/dosuTech/appbandt/admin/dist;
    index index.html;

    access_log /var/log/nginx/one.dosutech.site.access.log;
    error_log  /var/log/nginx/one.dosutech.site.error.log;

    charset utf-8;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss image/svg+xml;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:css|js|mjs|map|png|jpg|jpeg|gif|ico|svg|webp|woff2?|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
