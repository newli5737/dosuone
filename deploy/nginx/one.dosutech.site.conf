server {
    listen 80;
    listen [::]:80;
    server_name one.dosutech.site;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name one.dosutech.site;

    ssl_certificate     /etc/letsencrypt/live/one.dosutech.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/one.dosutech.site/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /home/dosuone/admin/dist;
    index index.html;

    access_log /var/log/nginx/one.dosutech.site.access.log;
    error_log  /var/log/nginx/one.dosutech.site.error.log;

    charset utf-8;
    client_max_body_size 25m;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    location /api/ {
        proxy_pass http://127.0.0.1:3018/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /assets/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
