# DOSUONE Admin — one.dosutech.site
# Static: /home/dosuone/admin/dist
#
# Lần đầu SSL:
#   sudo certbot certonly --nginx -d one.dosutech.site
#   sudo cp /home/dosuone/deploy/nginx/one.dosutech.site.conf /etc/nginx/sites-available/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name one.dosutech.site;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name one.dosutech.site;

    ssl_certificate     /etc/letsencrypt/live/one.dosutech.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/one.dosutech.site/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /home/dosuone/admin/dist;
    index index.html;

    access_log /var/log/nginx/one.dosutech.site.access.log;
    error_log  /var/log/nginx/one.dosutech.site.error.log;

    charset utf-8;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss image/svg+xml;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:css|js|mjs|map|png|jpg|jpeg|gif|ico|svg|webp|woff2?|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
