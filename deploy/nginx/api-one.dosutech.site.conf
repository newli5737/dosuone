# DOSUONE — Backend API (NestJS + PM2: dosuone-one-api)
# Domain: api-one.dosutech.site
# Repo:  /home/dosuTech/appbandt
# Port:  3018 (backend/.env PORT=3018)
#
# sudo cp .../deploy/nginx/api-one.dosutech.site.conf /etc/nginx/sites-available/
# sudo ln -sf /etc/nginx/sites-available/api-one.dosutech.site.conf /etc/nginx/sites-enabled/
# sudo nginx -t && sudo systemctl reload nginx
#
# Certbot sau: sudo certbot --nginx -d api-one.dosutech.site

server {
    listen 80;
    listen [::]:80;
    server_name api-one.dosutech.site;

    access_log /var/log/nginx/api-one.dosutech.site.access.log;
    error_log  /var/log/nginx/api-one.dosutech.site.error.log;

    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:3018;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }
}
