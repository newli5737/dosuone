name: dosuone_mobile
description: Dosuone Phone Store Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.0
  dio: ^5.4.0
  flutter_secure_storage: ^9.0.0
  hive_flutter: ^1.1.0
  go_router: ^13.0.0
  cached_network_image: ^3.3.0
  flutter_carousel_widget: ^2.3.0
  shimmer: ^3.0.0
  intl: ^0.19.0
  image_picker: ^1.0.0
  flutter_rating_bar: ^4.0.0
  lottie: ^3.1.0
  pretty_dio_logger: ^1.3.0
  shared_preferences: ^2.2.0
  google_fonts: ^6.2.1
  smooth_page_indicator: ^1.2.0
  font_awesome_flutter: ^10.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
